<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" fill="#11110f"/>

  <!-- Gradient defs -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d8e2c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6ebd9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded border -->
  <rect x="2" y="2" width="28" height="28" rx="6" fill="none" stroke="url(#grad)" stroke-width="1.5" opacity="0.6"/>

  <!-- Premium star symbol (✦) -->
  <g transform="translate(16, 16)">
    <!-- Central diamond -->
    <polygon points="0,-6 6,0 0,6 -6,0" fill="url(#grad)" opacity="0.9"/>

    <!-- Corner stars -->
    <circle cx="4" cy="-4" r="1.2" fill="url(#grad)" opacity="0.7"/>
    <circle cx="4" cy="4" r="1.2" fill="url(#grad)" opacity="0.7"/>
    <circle cx="-4" cy="4" r="1.2" fill="url(#grad)" opacity="0.7"/>
    <circle cx="-4" cy="-4" r="1.2" fill="url(#grad)" opacity="0.7"/>
  </g>
</svg>
